<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article to EPUB</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --panel: #ffffff;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: #d2d2d7;
        --accent: #0071e3;
        --accent-hover: #0064cc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #ffffff, var(--bg) 55%);
        color: var(--text);
      }
      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.07);
      }
      h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: -0.02em; }
      p { margin: 0; color: var(--muted); }
      form { margin-top: 22px; display: grid; gap: 12px; }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 13px 14px;
        font-size: 15px;
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        background: var(--accent);
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: var(--accent-hover); }
      button:disabled { opacity: 0.65; cursor: default; }
      .result {
        margin-top: 20px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        display: none;
      }
      .result a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      .error {
        margin-top: 16px;
        color: #b42318;
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>Article to EPUB</h1>
        <p>Paste a URL. Get a clean EPUB for Apple Books.</p>
        <form id="epubForm">
          <input id="urlInput" type="url" required placeholder="https://example.com/article" />
          <button id="submitBtn" type="submit">Create EPUB</button>
        </form>
        <div id="error" class="error"></div>
        <div id="result" class="result">
          <p id="resultMeta"></p>
          <p style="margin-top: 8px"><a id="downloadLink" href="#">Download EPUB</a></p>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("epubForm");
      const urlInput = document.getElementById("urlInput");
      const submitBtn = document.getElementById("submitBtn");
      const result = document.getElementById("result");
      const resultMeta = document.getElementById("resultMeta");
      const downloadLink = document.getElementById("downloadLink");
      const error = document.getElementById("error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.style.display = "none";
        result.style.display = "none";
        submitBtn.disabled = true;
        submitBtn.textContent = "Building...";

        try {
          const response = await fetch("/api/epub", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: urlInput.value.trim() }),
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Failed to create EPUB.");
          }

          resultMeta.textContent = `${payload.title} - ${payload.chapters} chapters ready`;
          downloadLink.href = payload.downloadUrl;
          result.style.display = "block";
        } catch (err) {
          error.textContent = err.message || "Unexpected error.";
          error.style.display = "block";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Create EPUB";
        }
      });
    </script>
  </body>
</html>
